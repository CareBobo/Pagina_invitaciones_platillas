services:
  - type: web
    name: invitaciones-boda
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: invitaciones-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
  
  - type: psql
    name: invitaciones-db
    plan: free
