services:
  - type: web
    name: invitaciones-boda
    env: python
    buildCommand: "pip install -r requirements.txt"
    preDeployCommand: "python -c 'from app import app, db, init_db_seeds; init_db_seeds()'"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: invitaciones-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
databases:
  - name: invitaciones-db
    plan: free
