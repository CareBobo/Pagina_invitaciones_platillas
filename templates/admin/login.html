<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - Invitaciones Premium</title>
    
    <!-- CSS de Administración -->
    <link rel="stylesheet" href="/static/css/admin.css">
    <!-- FontAwesome Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body" style="display: block; padding: 0;">

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-envelope-open-text" style="margin-right: 8px;"></i>Momentos Digitales ⭐
            </div>
            <p class="login-subtitle">Inicia sesión para gestionar tus invitaciones</p>
            
            <!-- Mensajes Flash de Error/Éxito -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div style="background-color: {% if category == 'success' %}#d1fae5{% else %}#fee2e2{% endif %}; 
                                    color: {% if category == 'success' %}#065f46{% else %}#991b1b{% endif %}; 
                                    padding: 12px; 
                                    border-radius: 8px; 
                                    font-size: 0.85rem; 
                                    font-weight: 500; 
                                    margin-bottom: 20px; 
                                    text-align: left;">
                            <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}" style="margin-right: 6px;"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/admin/login" method="POST">
                <div class="admin-form-group" style="text-align: left;">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Tu usuario" required autofocus>
                </div>
                
                <div class="admin-form-group" style="text-align: left; margin-bottom: 25px;">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                </div>
                
                <button type="submit" class="btn-admin primary" style="width: 100%; justify-content: center; padding: 12px;">
                    Iniciar Sesión <i class="fas fa-sign-in-alt" style="margin-left: 6px;"></i>
                </button>
            </form>
        </div>
    </div>

</body>
</html>
